
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login • Mountain View</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      overflow: hidden;
    }

    /* Login screen */
    #login-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }
    .login-box {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      padding: 2.5rem 2rem;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    h1 {
      text-align: center;
      margin-bottom: 1.8rem;
      font-size: 1.9rem;
    }
    .form-group {
      margin-bottom: 1.4rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }
    input {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.18);
      color: white;
      font-size: 1rem;
    }
    input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    button {
      width: 100%;
      padding: 0.95rem;
      background: #fff;
      color: #4c1d95;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }
    #error {
      color: #ffdddd;
      text-align: center;
      margin-top: 1rem;
      min-height: 1.2rem;
    }

    /* Main content after login */
    #main-content {
      opacity: 0;
      transition: opacity 1.2s ease;
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }
    #main-content h2 {
      font-size: 3.5rem;
      z-index: 2;
    }
    .butterfly {
      position: absolute;
      font-size: 3rem;
      pointer-events: none;
      animation: fly 18s infinite linear;
      opacity: 0.85;
    }
    @keyframes fly {
      0%   { transform: translate(-120vw, 30vh) rotate(0deg); }
      100% { transform: translate(120vw, -30vh) rotate(720deg); }
    }

    /* Tiny admin panel */
    #admin-panel {
      position: absolute;
      bottom: 12px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      color: #ddd;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      max-width: 320px;
      display: none;
    }
    #admin-panel.show {
      display: block;
    }
  </style>
</head>
<body>

  <div id="login-container">
    <div class="login-box">
      <h1>Welcome</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit">Login</button>
        <div id="error"></div>
      </form>
    </div>
  </div>

  <div id="main-content" style="display:none;">
    <h2>Beautiful Mountains ✧</h2>

    <!-- Some animated butterflies -->
    <div class="butterfly" style="top:15%; left:-10%; animation-delay:0s;">🦋</div>
    <div class="butterfly" style="top:25%; left:-15%; animation-delay:4s;">🦋</div>
    <div class="butterfly" style="top:40%; left:-5%;  animation-delay:8s;">🦋</div>
    <div class="butterfly" style="top:55%; left:-12%; animation-delay:2s;">🦋</div>
    <div class="butterfly" style="top:70%; left:-8%;  animation-delay:6s;">🦋</div>

    <div id="admin-panel">
      <strong>Admin Logins Today:</strong><br>
      • mr.krissu logged in at <span id="admin-time"></span>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const loginContainer = document.getElementById('login-container');
    const mainContent = document.getElementById('main-content');
    const adminPanel = document.getElementById('admin-panel');
    const adminTime = document.getElementById('admin-time');

    // You can change these credentials here
    const VALID_USER = "mr.krissu";
    const VALID_PASS = "Krishna@112";

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (username === VALID_USER && password === VALID_PASS) {
        // Successful admin login
        errorEl.textContent = "";
        loginContainer.style.opacity = "0";
        setTimeout(() => {
          loginContainer.style.display = "none";
          mainContent.style.display = "flex";
          setTimeout(() => mainContent.style.opacity = "1", 100);

          // Show tiny admin panel
          adminTime.textContent = new Date().toLocaleTimeString();
          adminPanel.classList.add("show");
        }, 800);
      } 
      else if (username && password) {
        // Normal user login (any non-empty username/password)
        errorEl.textContent = "";
        loginContainer.style.opacity = "0";
        setTimeout(() => {
          loginContainer.style.display = "none";
          mainContent.style.display = "flex";
          setTimeout(() => mainContent.style.opacity = "1", 100);
        }, 800);
      } 
      else {
        errorEl.textContent = "Please fill both fields";
      }
    });
  </script>

</body>
</html>
